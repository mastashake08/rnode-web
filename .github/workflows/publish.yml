name: Publish Package to NPM

on:
  push:
    tags:
      - 'v*' # Triggers when pushing tags matching v1.0.0, v2.1.3-beta, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    
    # Required permissions to generate cryptographic provenance attestations for NPM
    permissions:
      contents: read
      id-token: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*' # Automatically uses the latest LTS release
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci
        # If your project doesn't use dependencies or package-lock.json yet,
        # you can swap 'npm ci' to 'npm install' or comment this step out completely.

      - name: Publish to NPM Registry
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
